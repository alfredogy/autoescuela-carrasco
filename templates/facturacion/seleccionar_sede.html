{% extends 'base.html' %}

{% block title %}Seleccionar sede{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body text-center p-4">
                <i class="bi bi-building fs-1 text-primary mb-3 d-block"></i>
                <h4 class="mb-4">¿En qué sede vas a trabajar?</h4>
                {% for sede in autoescuelas %}
                <form method="post" class="mb-2">
                    {% csrf_token %}
                    <input type="hidden" name="autoescuela_id" value="{{ sede.pk }}">
                    <button type="submit" class="btn btn-outline-primary btn-lg w-100">
                        <i class="bi bi-geo-alt"></i> {{ sede.nombre }}
                    </button>
                </form>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

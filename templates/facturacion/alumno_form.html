{% extends "base.html" %}
{% block title %}Editar Alumno - Autoescuela Carrasco{% endblock %}

{% block content %}
<h2>Editar Alumno</h2>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{% url 'facturacion:alumno_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}

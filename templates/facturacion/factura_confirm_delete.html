{% extends "base.html" %}
{% block title %}Eliminar Factura{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <h4>Eliminar Factura {{ object.numero_factura }}</h4>
                <p class="text-muted">{{ object.nombre_factura }} - {{ object.total|floatformat:2 }} &euro;</p>
                <p>Esta acci&oacute;n no se puede deshacer.</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'facturacion:factura_detail' object.pk %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
